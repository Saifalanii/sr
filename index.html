<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skiftrapport App</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f8;
  padding: 20px;
}
.container {
  max-width: 500px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
input, textarea, select {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}
button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  background: #2a4d69;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
}
button:hover {
  background: #1e3a50;
}
label {
  font-weight: bold;
  margin-top: 12px;
  display: block;
}
</style>
</head>
<body>

<div class="container">
  <h2>📋 Skiftrapport</h2>

  <label>Datum</label>
  <input type="date" id="datum">

  <label>Avdelning</label>
  <select id="avdelning">
    <option value="">Välj</option>
    <option>TVS</option>
    <option>TPB</option>
  </select>

  <label>Maskin / Truck</label>
  <input id="maskin" placeholder="t.ex. TVS-01">

  <label>Orsak (NOK)</label>
  <textarea id="orsak" placeholder="Beskriv problemet"></textarea>

  <label>Åtgärd</label>
  <textarea id="atgard" placeholder="Beskriv åtgärd"></textarea>

  <button onclick="sendReport()">Skicka</button>
  <button type="button" onclick="clearForm()" style="background:#888;">Börja om</button>
</div>

<script>
datum.valueAsDate = new Date(); // default to today

async function sendReport() {
  const data = {
    datum: document.getElementById("datum").value,
    skift: "Test", // You can calculate shift dynamically
    avdelning: document.getElementById("avdelning").value,
    maskin: document.getElementById("maskin").value,
    orsak: document.getElementById("orsak").value,
    atgard: document.getElementById("atgard").value
  };

  if (!data.avdelning || !data.maskin) {
    alert("Vänligen fyll i avdelning och maskin!");
    return;
  }

  try {
    const response = await fetch(
      "https://script.google.com/macros/s/AKfycbwpU0-X7o5J5ADxAp1pxyYRaRiSRpycHPEC5X1YzLSMopimsnbx_OIDsrnKpCONR3G8/exec",
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      }
    );

    if (!response.ok) throw new Error("HTTP error " + response.status);

    alert("✅ Rapport skickad!");
    clearForm();

  } catch (err) {
    console.error("Fel vid skickande:", err);
    alert("❌ Fel vid skickande: " + err.message);
  }
}

function clearForm() {
  document.getElementById("datum").valueAsDate = new Date();
  document.getElementById("avdelning").value = "";
  document.getElementById("maskin").value = "";
  document.getElementById("orsak").value = "";
  document.getElementById("atgard").value = "";
}
</script>

</body>
</html>
